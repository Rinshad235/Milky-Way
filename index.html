    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
  body {
    background: linear-gradient(135deg, #eef2f7, #ffffff);
    font-family: 'Poppins', sans-serif;
  }

  /* NAVBAR */
  .navbar {
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.85) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .navbar-brand {
    font-weight: 700;
    font-size: 1.4rem;
    letter-spacing: 1px;
  }

  .nav-link {
    font-weight: 500;
    margin-right: 15px;
    position: relative;
  }

  .nav-link::after {
    content: "";
    width: 0%;
    height: 2px;
    background: #0d6efd;
    position: absolute;
    bottom: 0;
    left: 0;
    transition: 0.3s;
  }

  .nav-link:hover::after {
    width: 100%;
  }

  /* SEARCH */
  .form-control {
    border-radius: 50px;
    padding: 8px 15px;
  }

  .btn-outline-success {
    border-radius: 50px;
    padding: 6px 18px;
  }

  /* CAROUSEL HERO */
  .carousel {
    margin: 20px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }

  .carousel-item {
    position: relative;
  }

  .carousel-item img {
    height: 440px;
    object-fit: cover;
    filter: brightness(70%);
  }

  /* HERO TEXT */
  .carousel-caption {
    bottom: 30%;
    text-align: left;
  }

  .carousel-caption h2 {
    font-size: 2.5rem;
    font-weight: 700;
  }

  .carousel-caption p {
    font-size: 1.1rem;
  }

  .carousel-caption .btn {
    margin-top: 10px;
    border-radius: 30px;
    padding: 8px 20px;
  }

  /* SECTION TITLE */
  .section-title {
    text-align: center;
    margin: 50px 0 20px;
    font-weight: 700;
    font-size: 1.8rem;
  }

  /* PRODUCT CARD (future use) */
  .card {
    border: none;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  }

  .card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }

  .card img {
    height: 200px;
    object-fit: contain;
    padding: 10px;
  }

  .card-body h6 {
    font-weight: 600;
  }

  .card-body p {
    color: #0d6efd;
    font-weight: bold;
  }

  .footer {
  background: #111;
  color: #fff;
  padding: 30px 10px;
  margin-top: 60px;
}

.footer p {
  margin: 0;
  font-size: 0.95rem;
}

.social-icons a {
  display: inline-block;
  margin: 0 10px;
  transition: 0.3s;
}

.social-icons img {
  width: 30px;
  height: 30px;
  transition: 0.3s;
}

.social-icons a:hover {
  transform: translateY(-5px);
}

.social-icons img:hover {
  filter: brightness(0) invert(0.5) sepia(1) hue-rotate(180deg);
}
</style>
