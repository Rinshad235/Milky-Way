<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Milky Way</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #eef2f7, #ffffff);
      font-family: 'Poppins', sans-serif;
    }

    /* NAVBAR */
    .navbar {
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.85) !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar-brand {
      font-weight: 700;
      font-size: 1.4rem;
    }

    .nav-link {
      margin-right: 15px;
      position: relative;
    }

    .nav-link::after {
      content: "";
      width: 0%;
      height: 2px;
      background: #0d6efd;
      position: absolute;
      bottom: 0;
      left: 0;
      transition: 0.3s;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    /* HEADER */
    .page-title {
      text-align: center;
      margin: 40px 0 20px;
      font-weight: 700;
      font-size: 2rem;
    }

    /* PRODUCT CARD */
    .card {
      border: none;
      border-radius: 15px;
      overflow: hidden;
      transition: 0.3s;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .card img {
      height: 200px;
      object-fit: contain;
      padding: 10px;
    }

    .card-body h6 {
      font-weight: 600;
      min-height: 40px;
    }

    .price {
      color: #0d6efd;
      font-weight: bold;
      font-size: 1.1rem;
    }

    .btn-cart {
      border-radius: 25px;
      width: 100%;
      margin-top: 10px;
    }

    /* FOOTER */
    footer {
      margin-top: 60px;
      padding: 20px;
      text-align: center;
      background: #111;
      color: white;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light">
  <div class="container-fluid">

    <a class="navbar-brand" href="index.html">
      <img src="logo.png" width="30" height="24">
      Milky Way
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="product.html">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>

      <form class="d-flex">
        <input class="form-control me-2" type="search" placeholder="Search">
        <button class="btn btn-outline-success">Search</button>
      </form>
    </div>

  </div>
</nav>

<!-- TITLE -->
<h2 class="page-title">Explore Products</h2>

<!-- PRODUCTS -->
<div class="container">
  <div class="row" id="productContainer"></div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Milky Way | All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function fetchProducts() {
  try {
    const container = document.getElementById("productContainer");
    container.innerHTML = "";

    const res1 = await fetch("https://fakestoreapi.com/products/category/electronics");
    const data1 = await res1.json();

    const res2 = await fetch("https://dummyjson.com/products/category/smartphones");
    const res3 = await fetch("https://dummyjson.com/products/category/laptops");
    const res4 = await fetch("https://dummyjson.com/products/category/mobile-accessories");

    const data2 = (await res2.json()).products;
    const data3 = (await res3.json()).products;
    const data4 = (await res4.json()).products;

    const normalized1 = data1.map(p => ({
      title: p.title,
      price: p.price,
      image: p.image
    }));

    const normalized2 = [...data2, ...data3, ...data4].map(p => ({
      title: p.title,
      price: p.price,
      image: p.thumbnail
    }));

    let allProducts = [...normalized1, ...normalized2];

    const uniqueProducts = [];
    const titles = new Set();

    allProducts.forEach(p => {
      if (!titles.has(p.title)) {
        titles.add(p.title);
        uniqueProducts.push(p);
      }
    });

    const finalProducts = uniqueProducts.slice(0, 30);

    finalProducts.forEach(product => {
      container.innerHTML += `
        <div class="col-md-3 col-sm-6 mb-4">
          <div class="card h-100">
            <img src="${product.image}">
            <div class="card-body d-flex flex-column">
              <h6>${product.title}</h6>
              <p class="price">$${product.price}</p>
              <button class="btn btn-primary btn-cart mt-auto">Add to Cart</button>
            </div>
          </div>
        </div>
      `;
    });

  } catch (error) {
    console.log("Error:", error);
  }
}

fetchProducts();
</script>

</body>
</html>
